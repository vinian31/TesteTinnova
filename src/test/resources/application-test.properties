# Test Configuration
spring.profiles.active=test

# H2 Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Redis Configuration (Embedded)
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379

# JWT Configuration
# Secret key must be at least 256 bits (32 characters) for HMAC-SHA algorithms
app.jwt.secret=TestSecretKeyForJWTTokenGenerationInTestEnvironment2026WithMinimum256BitsRequired!@#$
app.jwt.expiration=86400000

# Logging
logging.level.root=WARN
logging.level.org.tinnova.teste=INFO

